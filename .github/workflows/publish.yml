name: Publish to PyPI

# Auto-publishes when you push a git tag like v1.2.0. The version in
# pyproject.toml must match the tag; the workflow fails fast if they
# disagree.
#
# One-time setup:
#   • Create a PyPI account + API token (see PYPI_PUBLISH.md)
#   • Add the token as a GitHub Actions secret named PYPI_API_TOKEN
#     under the repo's Settings → Secrets → Actions
#
# To release v1.2.1:
#   1. bump version in pyproject.toml + src/mcp_chainladder/__init__.py
#   2. git commit -am "Release v1.2.1"
#   3. git tag v1.2.1
#   4. git push origin main --tags
# Workflow takes over, builds, and uploads.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # for trusted publishing (an alternative to token)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Sanity-check version matches the tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(grep '^version' pyproject.toml | head -1 | sed -E 's/.*"(.*)".*/\1/')"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME doesn't match pyproject.toml version $FILE_VERSION"
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          rm -rf dist build *.egg-info src/*.egg-info
          python -m build

      - name: Check the artifacts
        run: python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
